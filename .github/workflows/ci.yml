name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Poetry and dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install poetry
          poetry config virtualenvs.create false || true
          poetry check --lock --no-interaction
          poetry install --with dev --no-interaction --no-ansi

      - name: Ruff format check
        run: poetry run ruff format --check src runbook tests typings

      - name: Ruff lint check
        run: poetry run ruff check src runbook tests typings

      - name: Type check (ty)
        run: poetry run ty check --project .

      - name: Complexity check (lizard)
        run: poetry run lizard src -C 8 -L 30 -a 4

      - name: Dead code check (vulture)
        run: poetry run vulture src runbook tests typings --min-confidence 80

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: .semgrep.yml

      - name: Run tests
        run: poetry run pytest -q
