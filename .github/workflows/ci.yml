name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Poetry and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false || true
          poetry install --no-root --with dev --no-interaction --no-ansi

      - name: Ruff format check
        run: poetry run ruff format --check src runbook tests typings

      - name: Ruff lint
        run: poetry run ruff check src runbook tests typings

      - name: Complexity check (lizard)
        run: poetry run python runbook/quality/check_complexity.py src --ccn 5 --length 25 --params 4 --strict

      - name: Dead code check (vulture)
        run: poetry run python runbook/quality/check_dead_code.py src

      - name: Validate TOML configs
        run: poetry run python runbook/quality/validate_configs.py --problems config/*.toml

      - name: Run tests
        run: poetry run pytest -q
