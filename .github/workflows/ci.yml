name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Poetry and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false || true
          poetry check --lock --no-interaction
          poetry install --with dev --no-interaction --no-ansi

      - name: Ruff format check
        run: poetry run ruff format --check src runbook tests typings

      - name: Ruff lint
        run: poetry run ruff check src runbook tests typings

      - name: Complexity check (lizard)
        run: poetry run python -m runbook.quality.check_complexity src --ccn 8 --length 30 --params 4 --strict

      - name: Import boundary check
        run: poetry run python -m runbook.quality.check_import_boundaries src runbook tests --strict

      - name: Dead code check (vulture)
        run: poetry run python -m runbook.quality.check_dead_code src

      - name: Validate TOML configs
        run: poetry run python -m runbook.quality.validate_configs --problems config/*.toml

      - name: Run tests
        run: poetry run pytest -q
