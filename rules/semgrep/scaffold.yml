rules:
  - id: adrift-root-scaffold-only
    message: >-
      Only these top-level packages are allowed directly under adrift/: adapters, cli,
      models, services, utils. Move this module or update the scaffold policy.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - /adrift/**/*.py
      exclude:
        - /adrift/adapters/**/*.py
        - /adrift/cli/**/*.py
        - /adrift/models/**/*.py
        - /adrift/services/**/*.py
        - /adrift/utils/**/*.py
        - /adrift/__init__.py
    pattern-regex: ^\s*(from|import|def|class|@|[A-Za-z_][\w]*\s*=)

  - id: tests-unit-mirror-adrift-top-level-shape
    message: >-
      Keep tests/unit aligned with adrift top-level layers only: adapters, cli,
      models, services, utils, and the audio adapter test slice. Add a new
      adrift layer first, then mirror it in tests/unit deliberately.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - /tests/unit/**/*.py
        - "**/tests/unit/**/*.py"
      exclude:
        - /tests/unit/__init__.py
        - "**/tests/unit/__init__.py"
        - /tests/unit/conftest.py
        - "**/tests/unit/conftest.py"
        - /tests/unit/adapters/**/*.py
        - "**/tests/unit/adapters/**/*.py"
        - /tests/unit/cli/**/*.py
        - "**/tests/unit/cli/**/*.py"
        - /tests/unit/models/**/*.py
        - "**/tests/unit/models/**/*.py"
        - /tests/unit/services/**/*.py
        - "**/tests/unit/services/**/*.py"
        - /tests/unit/utils/**/*.py
        - "**/tests/unit/utils/**/*.py"
    pattern-regex: ^\s*(from|import|def|class|@|[A-Za-z_][\w]*\s*=)

  - id: adrift-adapters-shape
    message: >-
      Keep adrift.adapters limited to the current stable shape: config, lint,
      process, reporting, errors.py, and package init files.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - /adrift/adapters/**/*.py
      exclude:
        - /adrift/adapters/__init__.py
        - /adrift/adapters/errors.py
        - /adrift/adapters/config/**/*.py
        - /adrift/adapters/lint/**/*.py
        - /adrift/adapters/process/**/*.py
        - /adrift/adapters/reporting/**/*.py
    pattern-regex: ^\s*(from|import|def|class|@|[A-Za-z_][\w]*\s*=)

  - id: no-cross-layer-init-reexport
    message: >-
      This __init__.py imports symbols from a different adrift layer and re-exports
      them. Consumers should import from the canonical source directly; shim packages
      add indirection with no value. Relative imports (from .module) for aggregation
      within your own package are fine and exempt from this rule. Excluded by design:
      adrift/adapters/__init__.py (registry with real logic) and
      adrift/cli/__init__.py (shared CLI constants and types).
    severity: ERROR
    languages: [python]
    paths:
      include:
        - /adrift/**/__init__.py
      exclude:
        - /adrift/__init__.py
        - /adrift/models/**/__init__.py
        - /adrift/adapters/__init__.py
        - /adrift/cli/__init__.py
    patterns:
      - pattern-either:
          - pattern: from adrift.models import $X
          - pattern: from adrift.models.$M import $X
          - pattern: from adrift.adapters import $X
          - pattern: from adrift.adapters.$M import $X
          - pattern: from adrift.services import $X
          - pattern: from adrift.services.$M import $X
          - pattern: from adrift.cli import $X
          - pattern: from adrift.cli.$M import $X
          - pattern: from adrift.utils import $X
          - pattern: from adrift.utils.$M import $X
