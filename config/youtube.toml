[[podcasts]]
name = "Last Week Tonight With John Oliver"
path = "/media/podcasts/last-week-tonight-with-john-oliver"
schedule = ["FREQ=WEEKLY;BYDAY=MO"]

[[podcasts.references]]
url = "yt://@LastWeekTonight"

[[podcasts.downloads]]
url = "yt://@LastWeekTonight"
[podcasts.downloads.filters]
include = ["Last Week Tonight With John Oliver"]
exclude = ["^s\\d{1,2}\\s*[-:]?\\s*e\\d{1,2}\\b"]


