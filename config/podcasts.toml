#:schema ../adrift/models/podcasts.schema.json
# cspell:disable


[[podcasts]]
name = "Behind the Bastards"
path = "/media/podcasts/behind-the-bastards"
schedule = ["FREQ=WEEKLY;BYDAY=TH,TU"]
tags = ["podcasts", "behind-the-bastards"]

[[podcasts.references]]
url = "https://www.omnycontent.com/d/playlist/e73c998e-6e60-432f-8610-ae210140c5b1/e5f91208-cc7e-4726-a312-ae280140ad11/d64f756d-6d5e-4fae-b24f-ae280140ad36/podcast.rss"
[podcasts.references.filters]
exclude = ["it could happen here", "behind the bastards presents", "czm rewind"]

[[podcasts.downloads]]
url = "yt://@BehindTheBastards"
[podcasts.downloads.filters]
exclude = ["it could happen here", "behind the bastards presents", "czm rewind"]

[podcasts.cleanup.title_normalization]
suffix_patterns = ["(?i)\\| behind the bastards$"]
slug_suffixes = ["Behind the Bastards"]


