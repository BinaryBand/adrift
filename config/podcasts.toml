[[podcasts]]
name = "Morbid"
path = "/media/podcasts/morbid"
schedule = ["FREQ=WEEKLY;BYDAY=TH,MO,TU"]
tags = ["podcasts", "morbid"]

[[podcasts.references]]
url = "https://feeds.simplecast.com/ohmVlJZQ"
[podcasts.references.filters]
exclude = ["listener tales", "listener tale"]

[[podcasts.downloads]]
url = "yt://@morbidpodcast"
[podcasts.downloads.filters]
exclude = ["listener tales", "listener tale"]

[[podcasts.downloads]]
url = "https://feeds.simplecast.com/ohmVlJZQ"
[podcasts.downloads.filters]
exclude = ["listener tales", "listener tale"]

[podcasts.alignment]
extra_stopwords = ["morbid"]

[podcasts.cleanup.title_normalization]
prefix_patterns = [
    "(?i)^episode(?:\\s+|\\-+)\\d{1,3}[:\\-]?\\s*",
    "(?i)^fan favorite:\\s*",
    "(?i)^episode revisit:\\s*",
]
suffix_patterns = [
    "(?i)\\|\\s*morbid:\\s*a true crime podcast$",
    "(?i)\\|\\s*morbid\\s*\\|\\s*podcast\\s*\\|\\s*video$",
    "(?i)\\|\\s*morbid\\s*\\|\\s*podcast$",
    "(?i)\\|\\s*morbid\\|\\s*podcast$",
    "(?i)\\|\\s*morbid$",
    "(?i)\\|\\s*episode\\s+\\d+\\s*$",
]
slug_suffixes = [
    "Morbid",
    "Morbid Podcast",
    "Morbid Podcast Video",
    "Morbid A True Crime Podcast",
]


